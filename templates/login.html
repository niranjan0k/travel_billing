{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body %}
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">
      <div class="login-brand">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Billing" style="width: 50px;">
        <div>
          <h1>Travel Billing Application</h1>
          <p class="text-center">Login Portal</p>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat if cat in ['success', 'info', 'warning', 'danger'] else 'info' }} alert-dismissible fade show">{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('login') }}" class="login-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control form-control-lg" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-accent btn-lg w-100" type="submit">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
{% endblock %}
